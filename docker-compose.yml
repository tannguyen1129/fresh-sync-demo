services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: freshsync_api
    restart: always
    ports:
      - "127.0.0.1:4100:4000"
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/freshsync?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "super-secret-key-production"
      PORT: 4000
      FRONTEND_URL: "https://freshsync.umtoj.edu.vn"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - freshsync-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://freshsync.umtoj.edu.vn/api"
    container_name: freshsync_web
    restart: always
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      - api
    networks:
      - freshsync-net

  postgres:
    image: postgres:15-alpine
    container_name: freshsync_db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: freshsync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - freshsync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d freshsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: freshsync_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - freshsync-net

networks:
  freshsync-net:
    driver: bridge

volumes:
  postgres_data:
