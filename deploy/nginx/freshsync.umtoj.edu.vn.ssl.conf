upstream freshsync_web {
    server 127.0.0.1:3100;
    keepalive 32;
}

upstream freshsync_api {
    server 127.0.0.1:4100;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name freshsync.umtoj.edu.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name freshsync.umtoj.edu.vn;

    ssl_certificate /etc/letsencrypt/live/freshsync.umtoj.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freshsync.umtoj.edu.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 20m;
    client_body_buffer_size 512k;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /socket.io/ {
        proxy_pass http://freshsync_api;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass http://freshsync_api;
    }

    location /_next/static/ {
        proxy_pass http://freshsync_web;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://freshsync_web;
    }
}
